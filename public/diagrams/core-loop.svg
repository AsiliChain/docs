<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .step-num { font-size: 14px; font-weight: 700; fill: #fff; }
    .step-title { font-size: 12px; font-weight: 600; fill: #1a0f07; }
    .step-desc { font-size: 9.5px; fill: #5c3d22; }
  </style>

  <!-- Connector lines -->
  <line x1="161" y1="110" x2="347" y2="110" stroke="#7a3b10" stroke-width="2"/>
  <polygon points="347,104 355,110 347,116" fill="#7a3b10"/>
  <line x1="421" y1="110" x2="607" y2="110" stroke="#C8922A" stroke-width="2"/>
  <polygon points="607,104 615,110 607,116" fill="#C8922A"/>
  <line x1="681" y1="110" x2="867" y2="110" stroke="#2D6A2D" stroke-width="2"/>
  <polygon points="867,104 875,110 867,116" fill="#2D6A2D"/>

  <!-- Step 1: Farmer registered -->
  <circle cx="125" cy="110" r="28" fill="#2D6A2D" stroke="#2D6A2D" stroke-width="2"/>
  <text x="125" y="115" text-anchor="middle" class="step-num">01</text>
  <!-- Person + check icon -->
  <g transform="translate(111, 96)" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="7" cy="5" r="3"/>
    <path d="M1 13v-1a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v1"/>
    <path d="M4 9l2 2 4-4"/>
  </g>
  <text x="125" y="155" text-anchor="middle" class="step-title">Farmer registered</text>
  <text x="125" y="172" text-anchor="middle" class="step-desc">NIN-linked wallet, GPS farm polygon</text>

  <!-- Step 2: Coffee delivered -->
  <circle cx="385" cy="110" r="28" fill="#4B2E0A" stroke="#4B2E0A" stroke-width="2"/>
  <text x="385" y="115" text-anchor="middle" class="step-num">02</text>
  <!-- Box icon -->
  <g transform="translate(373, 97)" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 1l8 4.5v9L12 19l-8-4.5v-9z"/>
    <path d="M12 1v9"/>
    <path d="M4 5.5l8 4.5"/>
  </g>
  <text x="385" y="155" text-anchor="middle" class="step-title">Coffee delivered</text>
  <text x="385" y="172" text-anchor="middle" class="step-desc">BatchToken minted, weight &amp; grade recorded</text>

  <!-- Step 3: Loan originated -->
  <circle cx="645" cy="110" r="28" fill="#C8922A" stroke="#C8922A" stroke-width="2"/>
  <text x="645" y="115" text-anchor="middle" class="step-num">03</text>
  <!-- Dollar/hand icon -->
  <g transform="translate(633, 97)" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <line x1="12" y1="8" x2="12" y2="16"/>
    <path d="M9 11h6a1.5 1.5 0 0 1 0 3h-6a1.5 1.5 0 0 1 0-3z"/>
  </g>
  <text x="645" y="155" text-anchor="middle" class="step-title">Loan originated</text>
  <text x="645" y="172" text-anchor="middle" class="step-desc">16% APR credit, USDC via LendingVault</text>

  <!-- Step 4: Export & payout -->
  <circle cx="905" cy="110" r="28" fill="#2D6A2D" stroke="#2D6A2D" stroke-width="2"/>
  <text x="905" y="115" text-anchor="middle" class="step-num">04</text>
  <!-- Globe + arrow icon -->
  <g transform="translate(891, 97)" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="14" cy="10" r="5"/>
    <line x1="9" y1="10" x2="19" y2="10"/>
    <path d="M14 5c1 1.5 1 3.5 0 5s-1 3.5 0 5"/>
    <path d="M4 15l3-3"/>
    <path d="M22 15l-3-3"/>
  </g>
  <text x="905" y="155" text-anchor="middle" class="step-title">Export &amp; payout</text>
  <text x="905" y="172" text-anchor="middle" class="step-desc">MTN MoMo payout in &lt;60 seconds</text>
</svg>
