# Astro static site — disable Jekyll processing entirely
# (GitHub Pages runs Jekyll on all repos by default)
title: AsiliChain Docs
theme: none
kramdown: {}
markdown: kramdown
safe: true

# Exclude everything — our built /dist is uploaded directly to pages
exclude:
  - src
  - node_modules
  - package.json
  - package-lock.json
  - astro.config.mjs
  - tsconfig.json
  - "*.astro"
  - "*.ts"
  - "*.tsx"
  - "*.js"
  - "*.css"
  - "*.md"
  - "*.mdx"
  - .gitignore
  - .env
  - .env.*
  - netlify.toml
  - vercel.json
  - dist
  - .astro
  - .starlight
  - public
  - scripts
  - src/**