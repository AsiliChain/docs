# Disable Jekyll processing — our Astro build outputs to /dist
# which is uploaded directly to GitHub Pages by our action
title: AsiliChain Docs
exclude:
  - src
  - "*.astro"
  - "*.ts"
  - "*.tsx"
  - "*.js"
  - "*.css"
  - "*.md"
  - "*.mdx"
  - _drafts
  - node_modules
  - public
  - scripts
  - .git
  - .github
  - dist
  - .astro
  - .starlight
  - netlify.toml
  - vercel.json
  - package.json
  - package-lock.json
  - tsconfig.json
  - astro.config.mjs
  - _config.yml
  - "*.png"
  - "*.jpg"
  - "*.svg"
  - "*.ico"
  - "*.woff"
  - "*.woff2"
  - "*.ttf"
  - "*.eot"